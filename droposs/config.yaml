name: Drop
version: v0.3.5
slug: droposs
description: Self-hosted open-source game distribution platform (alternative to Steam for DRM-free games)
url: "https://droposs.org/"
arch:
  - amd64
  - aarch64
init: false
ingress: true
ingress_port: 3000
ingress_entry: /
panel_icon: mdi:water
ports:
  3000/tcp: 3000
ports_description:
  3000/tcp: Web interface port (only needed if not using ingress)
map:
  - share:rw     # Internal HA storage for games
  - addon_config:rw  # Persistent app data
host_mounts: true  # localdisks
options:
  database_url: ""
  external_url: ""
  localdisks: ""
schema:
  database_url: str
  external_url: str
  localdisks: str?